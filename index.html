<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday!</title>
    <link rel="icon" type="image/jpeg" href="src/icon.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="intro-active">
    <div id="introOverlay" class="intro-overlay" aria-hidden="true">
      <div class="intro-content">
        <p class="intro-text">Happy Birthday My Love</p>
        <img class="intro-photo" src="src/HB.jpg" alt="Birthday photo" />
      </div>
    </div>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main id="mainPage" class="page">
      <section class="hero">
        <h1>Happy Birthday, <span id="name">Oliver</span></h1>
        <p class="subtitle">
          Today is all about you. Thank you for being my favorite person, my safe place, and my best adventure. :D
        </p>
        <button id="celebrateBtn" class="celebrate-btn">Surprise</button>
      </section>

      <section class="cards">
        <article class="card">
          <p>
            I hope this year brings you bold dreams, peaceful mornings, and so many reasons to laugh.
            And I hope I get to celebrate every win beside you.
          </p>
        </article>
      </section>

      <section class="wish-gif-wrap" aria-label="Birthday gif">
        <img class="wish-gif" src="src/rollingpiggy.gif" alt="Rolling pig birthday gif" />
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
